<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประเมินงานช่าง — SK ICE</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .logo { font-size: 2.5rem; margin-bottom: 4px; }
  .brand { font-size: 1.2rem; font-weight: 700; color: #1a73e8; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 24px; }
  .job-info {
    background: #f8f9fa;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 16px;
    text-align: left;
  }
  .job-info p { font-size: 0.9rem; color: #444; line-height: 1.7; }
  .job-info span { font-weight: 600; color: #222; }

  /* Edit window banner */
  .edit-banner {
    background: #fff8e1;
    border: 1.5px solid #ffc107;
    border-radius: 10px;
    padding: 10px 14px;
    margin-bottom: 16px;
    font-size: 0.85rem;
    color: #7a5c00;
    font-weight: 600;
  }
  .edit-banner .timer { color: #1a73e8; font-size: 1rem; }
  .edit-banner.expired {
    background: #fce8e6;
    border-color: #f28b82;
    color: #c5221f;
  }

  h2 { font-size: 1rem; color: #333; margin-bottom: 16px; }
  .tech-block { margin-bottom: 16px; }
  .tech-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: #1a73e8;
    background: #e8f0fe;
    border-radius: 20px;
    padding: 4px 14px;
    display: inline-block;
    margin-bottom: 10px;
  }
  .tech-divider { border: none; border-top: 1px dashed #e0e0e0; margin: 18px 0; }
  .stars { display: flex; justify-content: center; gap: 8px; margin-bottom: 6px; }
  .star {
    font-size: 2.8rem;
    cursor: pointer;
    color: #ddd;
    transition: color 0.15s, transform 0.15s;
    user-select: none;
    line-height: 1;
  }
  .star.active { color: #f5a623; }
  .star:hover { transform: scale(1.15); }
  .rating-label { font-size: 0.85rem; color: #888; height: 20px; margin-bottom: 8px; }
  textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 12px;
    font-size: 0.9rem;
    font-family: inherit;
    resize: none;
    height: 90px;
    margin-bottom: 20px;
    color: #333;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: #1a73e8; }
  button {
    width: 100%;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #1558c4; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #b0c8f5; cursor: not-allowed; }
  .thankyou { display: none; }
  .thankyou .big-icon { font-size: 4rem; margin-bottom: 16px; }
  .thankyou h2 { font-size: 1.3rem; color: #1a73e8; margin-bottom: 8px; }
  .thankyou p { font-size: 0.9rem; color: #666; line-height: 1.6; }
  .error-msg { color: #e53e3e; font-size: 0.82rem; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">

  <div id="formView">
    <div class="logo">🧊</div>
    <div class="brand">SK ICE</div>
    <div class="subtitle">ขอบคุณที่ใช้บริการครับ</div>

    <div class="job-info">
      <p>🏪 ร้าน: <span id="shopDisplay">—</span></p>
      <p>📋 รหัสงาน: <span id="jobIdDisplay">—</span></p>
      <p>👷 ช่าง: <span id="techDisplay">—</span></p>
    </div>

    <!-- แสดงเมื่ออยู่ใน edit window -->
    <div class="edit-banner" id="edit-banner" style="display:none">
      ✏️ แก้ไขคะแนนได้อีก <span class="timer" id="edit-timer">--:--</span>
    </div>

    <div id="ratings-container"></div>

    <p id="starError" class="error-msg" style="display:none">กรุณาให้คะแนนให้ครบก่อนส่งครับ</p>
    <textarea id="comment" placeholder="ความคิดเห็นเพิ่มเติม (ไม่บังคับ)"></textarea>
    <button id="submitBtn" onclick="submitRating()">ส่งคะแนน</button>
  </div>

  <div class="thankyou" id="thankyou">
    <div class="big-icon">🙏</div>
    <h2 id="ty-title">ขอบคุณมากครับ!</h2>
    <p id="ty-body">คะแนนของคุณช่วยให้เราปรับปรุงบริการได้<br>ขอบคุณที่ไว้วางใจ SK ICE นะครับ 🧊</p>
  </div>

</div>

<script>
var LABELS          = ['', 'ต้องปรับปรุง', 'พอใช้ได้', 'ดีครับ', 'ดีมาก!', 'ดีเยี่ยม! 🌟'];
var BASE            = 'https://n8n-production-b8f6.up.railway.app/webhook';
var RATED_KEY       = 'sk_ice_ratings_v2'; // {jobId: {at, ratings:{idx:val}, comment}}
var EDIT_WINDOW_MS  = 10 * 60 * 1000;      // 10 นาที

var selectedRatings = {};
var countdownTimer  = null;

// ── URL params ──
var params    = new URLSearchParams(location.search);
var jobId     = params.get('job') || '';
var shopName  = params.get('shop') ? decodeURIComponent(params.get('shop')) : '';
var techName  = params.get('tech') || '';
var techsRaw  = params.get('techs') || techName;
var techsList = techsRaw
  ? techsRaw.split(',').map(function(s){ return decodeURIComponent(s.trim()); }).filter(Boolean)
  : ['ไม่ระบุ'];

document.getElementById('shopDisplay').textContent  = shopName || 'ไม่ระบุ';
document.getElementById('jobIdDisplay').textContent = jobId    || 'ไม่ระบุ';
document.getElementById('techDisplay').textContent  = techsList.join(', ');

// ── ตรวจสอบ localStorage ──
var ratedData = JSON.parse(localStorage.getItem(RATED_KEY) || '{}');
var jobEntry  = jobId ? (ratedData[jobId] || null) : null;
var isEditMode = false;

if (jobEntry) {
  var elapsed = Date.now() - new Date(jobEntry.at).getTime();

  if (elapsed >= EDIT_WINDOW_MS) {
    // ล็อคแล้ว — แสดงหน้าขอบคุณ
    document.getElementById('formView').style.display = 'none';
    document.getElementById('thankyou').style.display = 'block';
    document.getElementById('ty-title').textContent = 'ให้คะแนนแล้วครับ 😊';
    document.getElementById('ty-body').textContent  = 'คุณได้ประเมินงานนี้ไปแล้ว ขอบคุณมากครับ 🙏';
  } else {
    // ยังอยู่ใน 10 นาที — edit mode
    isEditMode = true;
    document.getElementById('edit-banner').style.display = 'block';
    document.getElementById('submitBtn').textContent = '✏️ บันทึกการแก้ไข';
    startCountdown(EDIT_WINDOW_MS - elapsed);
  }
}

// ── สร้าง star blocks ──
function buildRatings() {
  var container = document.getElementById('ratings-container');
  var isSingle  = techsList.length === 1;

  var heading = document.createElement('h2');
  heading.textContent = isSingle ? 'คุณพอใจกับงานครั้งนี้แค่ไหน?' : 'ให้คะแนนช่างแต่ละคนครับ';
  container.appendChild(heading);

  techsList.forEach(function(tech, idx) {
    if (idx > 0) {
      var hr = document.createElement('hr');
      hr.className = 'tech-divider';
      container.appendChild(hr);
    }

    var block = document.createElement('div');
    block.className = 'tech-block';

    if (!isSingle) {
      var label = document.createElement('div');
      label.className   = 'tech-label';
      label.textContent = '👷 ' + tech;
      block.appendChild(label);
    }

    var starsDiv = document.createElement('div');
    starsDiv.className = 'stars';
    starsDiv.id = 'stars-' + idx;
    for (var v = 1; v <= 5; v++) {
      var star = document.createElement('span');
      star.className   = 'star';
      star.textContent = '★';
      star.dataset.idx = idx;
      star.dataset.val = v;
      star.addEventListener('click', onStarClick);
      starsDiv.appendChild(star);
    }
    block.appendChild(starsDiv);

    var rlabel = document.createElement('div');
    rlabel.className   = 'rating-label';
    rlabel.id          = 'label-' + idx;
    rlabel.textContent = 'กรุณาเลือกคะแนน';
    block.appendChild(rlabel);

    container.appendChild(block);
  });
}

function onStarClick() {
  var idx = parseInt(this.dataset.idx);
  var val = parseInt(this.dataset.val);
  selectedRatings[idx] = val;
  document.querySelectorAll('.star[data-idx="' + idx + '"]').forEach(function(s, i) {
    s.classList.toggle('active', i < val);
  });
  document.getElementById('label-' + idx).textContent = LABELS[val];
  document.getElementById('starError').style.display = 'none';
}

buildRatings();

// ── Pre-fill ถ้า edit mode ──
if (isEditMode && jobEntry.ratings) {
  Object.keys(jobEntry.ratings).forEach(function(idx) {
    var val = jobEntry.ratings[idx];
    selectedRatings[parseInt(idx)] = val;
    document.querySelectorAll('.star[data-idx="' + idx + '"]').forEach(function(s, i) {
      s.classList.toggle('active', i < val);
    });
    var lbl = document.getElementById('label-' + idx);
    if (lbl) lbl.textContent = LABELS[val];
  });
  if (jobEntry.comment) document.getElementById('comment').value = jobEntry.comment;
}

// ── Countdown ──
function startCountdown(remainingMs) {
  var startTime = Date.now();
  function tick() {
    var left = Math.max(0, remainingMs - (Date.now() - startTime));
    var m    = Math.floor(left / 60000);
    var s    = Math.floor((left % 60000) / 1000);
    var el   = document.getElementById('edit-timer');
    if (el) el.textContent = m + ':' + (s < 10 ? '0' : '') + s;

    if (left === 0) {
      clearInterval(countdownTimer);
      var banner = document.getElementById('edit-banner');
      if (banner) {
        banner.className = 'edit-banner expired';
        banner.textContent = '⏰ หมดเวลาแก้ไขแล้ว — คะแนนเดิมถูกบันทึกไว้แล้วครับ';
      }
      var btn = document.getElementById('submitBtn');
      if (btn) { btn.disabled = true; btn.textContent = 'หมดเวลาแก้ไขแล้ว'; }
    }
  }
  countdownTimer = setInterval(tick, 1000);
  tick();
}

function allRated() {
  return techsList.every(function(_, idx) { return !!selectedRatings[idx]; });
}

// ── Submit ──
async function submitRating() {
  if (!allRated()) {
    document.getElementById('starError').style.display = 'block';
    return;
  }
  var btn = document.getElementById('submitBtn');
  btn.disabled    = true;
  btn.textContent = 'กำลังส่ง...';

  var comment  = document.getElementById('comment').value.trim();
  var isSingle = techsList.length === 1;

  var payload = isSingle
    ? { job_id: jobId, rating: selectedRatings[0], comment: comment,
        tech_name: techsList[0], tech_names: techsList[0], customer_name: shopName }
    : { job_id: jobId,
        ratings: techsList.map(function(tech, idx) {
          return { tech_name: tech, rating: selectedRatings[idx] };
        }),
        comment: comment, tech_names: techsList.join(', '), customer_name: shopName };

  try {
    await fetch(BASE + '/rate-job', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) {}

  // บันทึก v2 format — เก็บ ratings เดิมไว้สำหรับ pre-fill ถ้ากลับมาแก้
  if (jobId) {
    ratedData[jobId] = {
      at:      new Date().toISOString(),
      ratings: Object.assign({}, selectedRatings),
      comment: comment
    };
    localStorage.setItem(RATED_KEY, JSON.stringify(ratedData));
  }

  if (countdownTimer) clearInterval(countdownTimer);

  document.getElementById('formView').style.display = 'none';
  document.getElementById('thankyou').style.display = 'block';

  // ถ้าเป็นการแก้ไข → ข้อความต่างกัน
  if (isEditMode) {
    document.getElementById('ty-title').textContent = 'บันทึกการแก้ไขแล้วครับ ✅';
    document.getElementById('ty-body').textContent  = 'คะแนนของคุณได้รับการอัพเดทแล้ว\nขอบคุณที่ไว้วางใจ SK ICE ครับ 🧊';
  }
}
</script>
</body>
</html>
