<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประเมินงานช่าง — SK ICE</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .logo { font-size: 2.5rem; margin-bottom: 4px; }
  .brand { font-size: 1.2rem; font-weight: 700; color: #1a73e8; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 24px; }
  .job-info {
    background: #f8f9fa;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 24px;
    text-align: left;
  }
  .job-info p { font-size: 0.9rem; color: #444; line-height: 1.7; }
  .job-info span { font-weight: 600; color: #222; }
  h2 { font-size: 1rem; color: #333; margin-bottom: 16px; }

  .tech-block { margin-bottom: 16px; }
  .tech-label {
    font-size: 0.82rem;
    font-weight: 700;
    color: #1a73e8;
    background: #e8f0fe;
    border-radius: 20px;
    padding: 4px 14px;
    display: inline-block;
    margin-bottom: 10px;
  }
  .tech-divider {
    border: none;
    border-top: 1px dashed #e0e0e0;
    margin: 18px 0;
  }
  .stars {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 6px;
  }
  .star {
    font-size: 2.8rem;
    cursor: pointer;
    color: #ddd;
    transition: color 0.15s, transform 0.15s;
    user-select: none;
    line-height: 1;
  }
  .star.active { color: #f5a623; }
  .star:hover { transform: scale(1.15); }
  .rating-label {
    font-size: 0.85rem;
    color: #888;
    height: 20px;
    margin-bottom: 8px;
  }
  textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 12px;
    font-size: 0.9rem;
    font-family: inherit;
    resize: none;
    height: 90px;
    margin-bottom: 20px;
    color: #333;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: #1a73e8; }
  button {
    width: 100%;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #1558c4; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #b0c8f5; cursor: not-allowed; }
  .thankyou { display: none; }
  .thankyou .big-icon { font-size: 4rem; margin-bottom: 16px; }
  .thankyou h2 { font-size: 1.3rem; color: #1a73e8; margin-bottom: 8px; }
  .thankyou p { font-size: 0.9rem; color: #666; line-height: 1.6; }
  .error-msg { color: #e53e3e; font-size: 0.82rem; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">

  <div id="formView">
    <div class="logo">🧊</div>
    <div class="brand">SK ICE</div>
    <div class="subtitle">ขอบคุณที่ใช้บริการครับ</div>

    <div class="job-info">
      <p>📋 รหัสงาน: <span id="jobIdDisplay">—</span></p>
      <p>👷 ช่าง: <span id="techDisplay">—</span></p>
    </div>

    <div id="ratings-container"></div>

    <p id="starError" class="error-msg" style="display:none">กรุณาให้คะแนนให้ครบก่อนส่งครับ</p>
    <textarea id="comment" placeholder="ความคิดเห็นเพิ่มเติม (ไม่บังคับ)"></textarea>
    <button id="submitBtn" onclick="submitRating()">ส่งคะแนน</button>
  </div>

  <div class="thankyou" id="thankyou">
    <div class="big-icon">🙏</div>
    <h2>ขอบคุณมากครับ!</h2>
    <p>คะแนนของคุณช่วยให้เราปรับปรุงบริการได้<br>ขอบคุณที่ไว้วางใจ SK ICE นะครับ 🧊</p>
  </div>

</div>

<script>
const LABELS = ['', 'ต้องปรับปรุง', 'พอใช้ได้', 'ดีครับ', 'ดีมาก!', 'ดีเยี่ยม! 🌟'];
const BASE   = 'https://n8n-production-b8f6.up.railway.app/webhook';

const selectedRatings = {}; // index → star value (1-5)

// ── URL params ──
const params    = new URLSearchParams(location.search);
const jobId     = params.get('job') || '';
const techName  = params.get('tech') || '';
const techsRaw  = params.get('techs') || techName;
const techsList = techsRaw
  ? techsRaw.split(',').map(function(s){ return decodeURIComponent(s.trim()); }).filter(Boolean)
  : ['ไม่ระบุ'];

document.getElementById('jobIdDisplay').textContent = jobId || 'ไม่ระบุ';
document.getElementById('techDisplay').textContent  = techsList.join(', ');

// ── ป้องกันรีวิวซ้ำ ──
const RATED_KEY = 'sk_ice_rated_jobs';
var ratedJobs = JSON.parse(localStorage.getItem(RATED_KEY) || '[]');
if (jobId && ratedJobs.includes(jobId)) {
  document.getElementById('formView').style.display = 'none';
  document.getElementById('thankyou').style.display = 'block';
  document.querySelector('.thankyou h2').textContent = 'ให้คะแนนแล้วครับ 😊';
  document.querySelector('.thankyou p').textContent  = 'คุณได้ประเมินงานนี้ไปแล้ว ขอบคุณมากครับ 🙏';
}

// ── Build rating blocks ด้วย DOM (ไม่ใช้ innerHTML กับ user-input) ──
function buildRatings() {
  var container = document.getElementById('ratings-container');
  var isSingle  = techsList.length === 1;

  var heading = document.createElement('h2');
  heading.textContent = isSingle ? 'คุณพอใจกับงานครั้งนี้แค่ไหน?' : 'ให้คะแนนช่างแต่ละคนครับ';
  container.appendChild(heading);

  techsList.forEach(function(tech, idx) {
    // divider ระหว่างช่าง
    if (idx > 0) {
      container.appendChild(document.createElement('hr')).className = 'tech-divider';
    }

    var block = document.createElement('div');
    block.className = 'tech-block';

    // label ชื่อช่าง (เฉพาะ multi-tech)
    if (!isSingle) {
      var label = document.createElement('div');
      label.className   = 'tech-label';
      label.textContent = '👷 ' + tech;
      block.appendChild(label);
    }

    // stars row
    var starsDiv = document.createElement('div');
    starsDiv.className = 'stars';
    starsDiv.id        = 'stars-' + idx;
    for (var v = 1; v <= 5; v++) {
      var star = document.createElement('span');
      star.className    = 'star';
      star.textContent  = '★';
      star.dataset.idx  = idx;
      star.dataset.val  = v;
      star.addEventListener('click', onStarClick);
      starsDiv.appendChild(star);
    }
    block.appendChild(starsDiv);

    // rating label
    var rlabel = document.createElement('div');
    rlabel.className = 'rating-label';
    rlabel.id        = 'label-' + idx;
    rlabel.textContent = 'กรุณาเลือกคะแนน';
    block.appendChild(rlabel);

    container.appendChild(block);
  });
}

function onStarClick() {
  var idx = parseInt(this.dataset.idx);
  var val = parseInt(this.dataset.val);
  selectedRatings[idx] = val;
  document.querySelectorAll('.star[data-idx="' + idx + '"]').forEach(function(s, i) {
    s.classList.toggle('active', i < val);
  });
  document.getElementById('label-' + idx).textContent = LABELS[val];
  document.getElementById('starError').style.display = 'none';
}

buildRatings();

function allRated() {
  return techsList.every(function(_, idx) { return !!selectedRatings[idx]; });
}

async function submitRating() {
  if (!allRated()) {
    document.getElementById('starError').style.display = 'block';
    return;
  }
  var btn = document.getElementById('submitBtn');
  btn.disabled    = true;
  btn.textContent = 'กำลังส่ง...';

  var comment  = document.getElementById('comment').value.trim();
  var isSingle = techsList.length === 1;

  var payload = isSingle
    ? { job_id: jobId, rating: selectedRatings[0], comment: comment,
        tech_name: techsList[0], tech_names: techsList[0] }
    : { job_id: jobId,
        ratings: techsList.map(function(tech, idx) {
          return { tech_name: tech, rating: selectedRatings[idx] };
        }),
        comment: comment, tech_names: techsList.join(', ') };

  try {
    await fetch(BASE + '/rate-job', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch(e) {}

  // บันทึกกัน re-submit
  if (jobId) {
    var updated = JSON.parse(localStorage.getItem(RATED_KEY) || '[]');
    if (!updated.includes(jobId)) updated.push(jobId);
    localStorage.setItem(RATED_KEY, JSON.stringify(updated));
  }

  document.getElementById('formView').style.display = 'none';
  document.getElementById('thankyou').style.display = 'block';
}
</script>
</body>
</html>
