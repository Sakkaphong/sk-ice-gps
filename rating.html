<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ประเมินงานช่าง — SK ICE</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f4f8;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .card {
    background: white;
    border-radius: 16px;
    padding: 32px 24px;
    max-width: 400px;
    width: 100%;
    box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    text-align: center;
  }
  .logo { font-size: 2.5rem; margin-bottom: 4px; }
  .brand { font-size: 1.2rem; font-weight: 700; color: #1a73e8; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #666; margin-bottom: 24px; }
  .job-info {
    background: #f8f9fa;
    border-radius: 10px;
    padding: 12px 16px;
    margin-bottom: 24px;
    text-align: left;
  }
  .job-info p { font-size: 0.9rem; color: #444; line-height: 1.7; }
  .job-info span { font-weight: 600; color: #222; }
  h2 { font-size: 1rem; color: #333; margin-bottom: 16px; }

  /* Stars */
  .stars {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .star {
    font-size: 2.8rem;
    cursor: pointer;
    color: #ddd;
    transition: color 0.15s, transform 0.15s;
    user-select: none;
    line-height: 1;
  }
  .star.active { color: #f5a623; }
  .star:hover { transform: scale(1.15); }
  .rating-label {
    font-size: 0.85rem;
    color: #888;
    height: 20px;
    margin-bottom: 20px;
  }

  textarea {
    width: 100%;
    border: 1.5px solid #e0e0e0;
    border-radius: 10px;
    padding: 12px;
    font-size: 0.9rem;
    font-family: inherit;
    resize: none;
    height: 90px;
    margin-bottom: 20px;
    color: #333;
    transition: border-color 0.2s;
    outline: none;
  }
  textarea:focus { border-color: #1a73e8; }

  button {
    width: 100%;
    background: #1a73e8;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: #1558c4; }
  button:active { transform: scale(0.98); }
  button:disabled { background: #b0c8f5; cursor: not-allowed; }

  /* Thank you */
  .thankyou { display: none; }
  .thankyou .big-icon { font-size: 4rem; margin-bottom: 16px; }
  .thankyou h2 { font-size: 1.3rem; color: #1a73e8; margin-bottom: 8px; }
  .thankyou p { font-size: 0.9rem; color: #666; line-height: 1.6; }

  .error-msg { color: #e53e3e; font-size: 0.82rem; margin-top: -12px; margin-bottom: 12px; }
</style>
</head>
<body>
<div class="card">

  <!-- Form -->
  <div id="formView">
    <div class="logo">🧊</div>
    <div class="brand">SK ICE</div>
    <div class="subtitle">ขอบคุณที่ใช้บริการครับ</div>

    <div class="job-info">
      <p>📋 รหัสงาน: <span id="jobIdDisplay">—</span></p>
      <p>👷 ช่าง: <span id="techDisplay">—</span></p>
    </div>

    <h2>คุณพอใจกับงานครั้งนี้แค่ไหน?</h2>

    <div class="stars" id="stars">
      <span class="star" data-val="1">★</span>
      <span class="star" data-val="2">★</span>
      <span class="star" data-val="3">★</span>
      <span class="star" data-val="4">★</span>
      <span class="star" data-val="5">★</span>
    </div>
    <div class="rating-label" id="ratingLabel">กรุณาเลือกคะแนน</div>

    <p id="starError" class="error-msg" style="display:none">กรุณาเลือกคะแนนก่อนส่งครับ</p>

    <textarea id="comment" placeholder="ความคิดเห็นเพิ่มเติม (ไม่บังคับ)"></textarea>

    <button id="submitBtn" onclick="submitRating()">ส่งคะแนน</button>
  </div>

  <!-- Thank you -->
  <div class="thankyou" id="thankyou">
    <div class="big-icon">🙏</div>
    <h2>ขอบคุณมากครับ!</h2>
    <p>คะแนนของคุณช่วยให้เราปรับปรุงบริการได้<br>ขอบคุณที่ไว้วางใจ SK ICE นะครับ 🧊</p>
  </div>

</div>

<script>
const LABELS = ['', 'ต้องปรับปรุง', 'พอใช้ได้', 'ดีครับ', 'ดีมาก!', 'ดีเยี่ยม! 🌟'];
const BASE   = 'https://n8n-production-b8f6.up.railway.app/webhook';

let selectedRating = 0;

// Read URL params
const params   = new URLSearchParams(location.search);
const jobId    = params.get('job') || '';
const techName = params.get('tech') || '';
document.getElementById('jobIdDisplay').textContent = jobId || 'ไม่ระบุ';
document.getElementById('techDisplay').textContent  = techName ? decodeURIComponent(techName) : 'ไม่ระบุ';

// ป้องกันรีวิวซ้ำ — เช็ค localStorage
const RATED_KEY = 'sk_ice_rated_jobs';
const ratedJobs = JSON.parse(localStorage.getItem(RATED_KEY) || '[]');
if (jobId && ratedJobs.includes(jobId)) {
  document.getElementById('formView').style.display = 'none';
  document.getElementById('thankyou').style.display = 'block';
  document.querySelector('.thankyou h2').textContent = 'ให้คะแนนแล้วครับ 😊';
  document.querySelector('.thankyou p').textContent = 'คุณได้ประเมินงานนี้ไปแล้ว ขอบคุณมากครับ 🙏';
}

// Star rating
document.querySelectorAll('.star').forEach(star => {
  star.addEventListener('click', () => {
    selectedRating = parseInt(star.dataset.val);
    document.querySelectorAll('.star').forEach((s, i) => {
      s.classList.toggle('active', i < selectedRating);
    });
    document.getElementById('ratingLabel').textContent = LABELS[selectedRating];
    document.getElementById('starError').style.display = 'none';
  });
});

async function submitRating() {
  if (!selectedRating) {
    document.getElementById('starError').style.display = 'block';
    return;
  }
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = 'กำลังส่ง...';

  try {
    await fetch(BASE + '/rate-job', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        job_id: jobId,
        rating: selectedRating,
        comment: document.getElementById('comment').value.trim(),
        tech_name: decodeURIComponent(techName)
      })
    });
  } catch(e) { /* neverError */ }

  // บันทึก job_id ลง localStorage
  if (jobId) {
    const updated = JSON.parse(localStorage.getItem(RATED_KEY) || '[]');
    if (!updated.includes(jobId)) updated.push(jobId);
    localStorage.setItem(RATED_KEY, JSON.stringify(updated));
  }

  document.getElementById('formView').style.display = 'none';
  document.getElementById('thankyou').style.display = 'block';
}
</script>
</body>
</html>
